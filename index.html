<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GRIFTECH — Магазин периферии</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- Оверлей для корзины -->
<div id="cartOverlay" class="cart-overlay"></div>

<!-- Выдвижная корзина -->
<div id="cartSidebar" class="cart-sidebar">
    <div class="cart-header">
        <h2><i class="fas fa-shopping-cart"></i> Корзина</h2>
        <div class="container breadcrumbs" id="breadcrumbs"></div>
    </div>
    <div id="cartItemsContainer" class="cart-items"></div>
    <div class="cart-footer">
        <div class="promo-section">
            <input type="text" id="promoInput" placeholder="Промокод">
            <button id="applyPromoBtn" class="btn-secondary">Применить</button>
        </div>
        <div class="cart-summary">
            <div class="summary-row"><span>Сумма:</span><span id="cartSubtotal">$0.00</span></div>
            <div class="summary-row"><span>Скидка:</span><span id="cartDiscount">$0.00</span></div>
            <div class="summary-row cart-total"><span>Итого:</span><span id="cartTotal">$0.00</span></div>
        </div>
        <button id="checkoutBtn" class="checkout-btn">Оформить заказ</button>
    </div>
</div>
    <header class="header">
        <div class="container header__container">
            <div class="logo">
                <i class="fas fa-microchip"></i>
                <span>GRIFTECH</span>
            </div>
            <div class="header__actions">
                <button class="cart-btn" id="cartBtn">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cartCount" class="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container hero__container">
                <h1>Игровая периферия будущего</h1>
                <p>Мыши, клавиатуры, мониторы — только лучшие технологии</p>
            </div>
        </section>

        <section class="filters-section">
            <div class="container">
                <div class="filters-grid">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Поиск товаров...">
                    </div>
                    <div class="category-filter">
                        <select id="categorySelect">
                            <option value="all">Все категории</option>
                            <option value="mouse">Мышки</option>
                            <option value="keyboard">Клавиатуры</option>
                            <option value="monitor">Мониторы</option>
                            <option value="monitor">Видеокарты</option>
                            <option value="monitor">Процессоры</option>
                        </select>
                    </div>
                    <div class="sort-filter">
                        <select id="sortSelect">
                            <option value="default">Сортировка</option>
                            <option value="price-asc">Цена: по возрастанию</option>
                            <option value="price-desc">Цена: по убыванию</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <section class="products-section">
            <div class="container">
                <div class="products-grid" id="productsGrid">
                    <!-- Товары будут загружены сюда -->
                    <div class="loader">Загрузка...</div>
                </div>
            </div>
        </section>
    </main>

    <!-- Модалка товара -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-body" id="modalBody">
                <!-- Динамическое содержимое -->
            </div>
        </div>
    </div>

    <!-- Модалка корзины -->
    <div id="cartModal" class="modal">
        <div class="modal-content cart-modal">
            <span class="close-modal" id="closeCartModal">&times;</span>
            <h2>Ваша корзина</h2>
            <div id="cartItemsList" class="cart-items-list"></div>
            <div class="cart-total">
                <strong>Итого: </strong><span id="cartTotal">0</span> $
            </div>
            <button id="checkoutBtn" class="btn-primary">Оформить заказ</button>
        </div>
    </div>

    <script src="main.js"></script>
    <footer>
    <div class="container">
        <p>© 2026 GRIFTECH — Игровая периферия будущего</p>
    </div>
</footer>
</body>
</html>
